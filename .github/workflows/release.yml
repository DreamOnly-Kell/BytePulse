name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build Release
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: bytepulse-linux-amd64
            archive: bytepulse-linux-amd64.tar.gz
          - goos: linux
            goarch: arm64
            output: bytepulse-linux-arm64
            archive: bytepulse-linux-arm64.tar.gz
          - goos: darwin
            goarch: amd64
            output: bytepulse-darwin-amd64
            archive: bytepulse-darwin-amd64.tar.gz
          - goos: darwin
            goarch: arm64
            output: bytepulse-darwin-arm64
            archive: bytepulse-darwin-arm64.tar.gz
          - goos: windows
            goarch: amd64
            output: bytepulse-windows-amd64.exe
            archive: bytepulse-windows-amd64.zip
          - goos: windows
            goarch: arm64
            output: bytepulse-windows-arm64.exe
            archive: bytepulse-windows-arm64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o dist/${{ matrix.output }} ./cmd/bytepulse

      - name: Package Unix archive
        if: matrix.goos != 'windows'
        run: tar -czf dist/${{ matrix.archive }} -C dist ${{ matrix.output }}

      - name: Package Windows archive
        if: matrix.goos == 'windows'
        run: cd dist && zip ${{ matrix.archive }} ${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
