name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Verify modules
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: Run tests
        run: go test ./...

  build:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: bytepulse-linux-amd64
          - goos: linux
            goarch: arm64
            output: bytepulse-linux-arm64
          - goos: darwin
            goarch: amd64
            output: bytepulse-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: bytepulse-darwin-arm64
          - goos: windows
            goarch: amd64
            output: bytepulse-windows-amd64.exe
          - goos: windows
            goarch: arm64
            output: bytepulse-windows-arm64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o dist/${{ matrix.output }} ./cmd/bytepulse

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}
          if-no-files-found: error
